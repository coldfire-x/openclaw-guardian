openclaw:
  host: 127.0.0.1
  port: 18789
  health_path: /healthz
  process_name: openclaw-gateway
  log_path: /var/log/openclaw/gateway.log
  check_interval_sec: 60
  down_threshold: 3

telegram:
  enabled: true
  bot_token: "replace-with-telegram-bot-token"
  proxy: "" # optional: http://127.0.0.1:7890 / https://... / socks5://...

llm:
  provider: openai
  api_url: https://api.openai.com/v1
  api_key: "replace-with-llm-api-key"
  api_key_env: OPENCLAW_GUARDIAN_LLM_API_KEY
  model: gpt-4.1-mini
  timeout_sec: 30
